        function updateFavCount() {
            const favToggleBtn = document.getElementById('favoritesToggleBtn');
            if (favToggleBtn) {
                favToggleBtn.textContent = `⭐ 收藏夹 (${favoriteIds.length})`;
            }
            const favToggleBtn2 = document.getElementById('favoritesToggleBtn2');
            if (favToggleBtn2) {
                favToggleBtn2.textContent = `⭐ 收藏夹 (${favoriteIds.length})`;
            }
        }

        function showEmpty(panel) {
            const target = (panel === 'clause') ? document.getElementById('clauseContent') : document.getElementById(
                'searchResultContent');
            target.innerHTML = `<div class="empty-state"><div class="icon">📄</div><p>请从左侧目录选择条款</p></div>`;
        }

        function renderNav(filterCategory, highlightIds) {
            let list = clauseData;
            if (filterCategory !== '全部') list = list.filter(c => c.category === filterCategory);
            if (searchKeyword && searchResults.length > 0) {
                const hitIds = new Set(searchResults);
                list = list.filter(c => hitIds.has(c.id));
            }
            list.sort((a, b) => a.id - b.id);

            const editCache = {};
            for (const c of list) {
                const cKey = STORAGE_PREFIX_CLAUSE + c.id;
                const sKey = STORAGE_PREFIX_SEARCH + c.id;
                const hasClauseEdit = localStorage.getItem(cKey) !== null;
                const hasSearchEdit = localStorage.getItem(sKey) !== null;
                editCache[c.id] = hasClauseEdit || hasSearchEdit;
            }

            let html = '';
            list.forEach(c => {
                const isActive = (c.id === currentClauseId);
                let tag = '';
                if (c.comparisons) {
                    const hasDiff = c.comparisons.some(item => item.diff);
                    if (hasDiff) {
                        const diffs = c.comparisons.map(item => item.diff).filter(Boolean);
                        if (diffs.includes('new')) tag = '<span class="tag new">新增</span>';
                        else if (diffs.includes('mod')) tag = '<span class="tag mod">修改</span>';
                        else if (diffs.includes('del')) tag = '<span class="tag del">删除</span>';
                        else if (diffs.includes('move')) tag = '<span class="tag mod">调整</span>';
                    }
                }
                const hasEdit = editCache[c.id] || false;
                const editMark = hasEdit ? ' ✏️' : '';
                const highlight = highlightIds && highlightIds.includes(c.id) ? ' style="background:#fef9c3;"' : '';
                html += `<div class="nav-item${isActive ? ' active' : ''}" data-id="${c.id}"${highlight}>
                            <span class="num">${c.id}.</span>
                            <span class="title-text">${c.title}${editMark}</span>${tag}</div>`;
            });
            if (!html) html = '<div style="padding:20px;color:#94a3b8;text-align:center;">无匹配条款</div>';
            document.getElementById('navList').innerHTML = html;
        }

        function showClauseInPanel(id, panel) {
            const clause = clauseData.find(c => c.id === id);
            if (!clause) { showEmpty(panel); return; }
            currentClauseId = id;
            currentEditPanel = panel;

            const target = (panel === 'clause') ? document.getElementById('clauseContent') : document.getElementById('searchResultContent');

            let savedContent = null;
            if (window.__PRELOADED_MODS__) {
                const key = panel + '_' + id;
                if (window.__PRELOADED_MODS__[key]) {
                    savedContent = window.__PRELOADED_MODS__[key];
                }
            }
            if (!savedContent) {
                savedContent = loadClauseEdit(id, panel);
            }

            if (savedContent !== null) {
                target.innerHTML = savedContent;
                updateEditStatus(`📂 已加载修改 (${new Date().toLocaleTimeString()})`);
                if (isEditing) target.contentEditable = true;
                renderNav(currentCategory);
                return;
            }

            let contentHtml = '';
            const diffSummary = clause.comparisons && clause.comparisons.some(i => i.diff) ? ' ⚡ 有变化' : '';
            contentHtml += `<div class="clause-header"><h2>第${clause.id}条 ${clause.title} ${diffSummary}</h2>
                <div class="meta">`;
            if (clause.category) {
                contentHtml += `<span class="cat">${categoryMap[clause.category] || ''} ${clause.category}</span>`;
            }
            contentHtml += `<span>条款编号: ${clause.id}</span></div></div>`;
            if (clause.comparisons && clause.comparisons.length > 0) {
                let rows = '';
                clause.comparisons.forEach(item => {
                    const diffClass = item.diff ? `diff-badge ${item.diff}` : '';
                    const diffLabel = item.diff === 'new' ? '新增' : item.diff === 'mod' ? '修改' : item.diff === 'del' ? '删除' : item.diff === 'move' ? '调整' : '';
                    let v2020Display = item.v2020 !== null && item.v2020 !== undefined ? item.v2020 : '<span class="del-text">（无对应项）</span>';
                    let v2026Display = item.v2026 !== null && item.v2026 !== undefined ? item.v2026 : '<span class="del-text">（删除）</span>';
                    if (item.html2020) v2020Display = item.html2020;
                    if (item.html2026) v2026Display = item.html2026;
                    let useCustomHtml = !!item.html2026;
                    let v2020Text = v2020Display,
                        v2026Text = v2026Display;
                    if (searchKeyword && !useCustomHtml) {
                        const regex = new RegExp(escapeRegExp(searchKeyword), 'gi');
                        if (typeof v2020Text === 'string') v2020Text = v2020Text.replace(regex, match =>
                            `<span class="highlight-match">${match}</span>`);
                        if (typeof v2026Text === 'string') v2026Text = v2026Text.replace(regex, match =>
                            `<span class="highlight-match">${match}</span>`);
                    }
                    let v2020Class = '',
                        v2026ClassColor = '';
                    if (!useCustomHtml) {
                        if (item.diff === 'new') v2026ClassColor = 'text-red-bg';
                        else if (item.diff === 'mod') v2026ClassColor = 'text-green-bg';
                        else if (item.diff === 'del') v2020Class = 'text-blue-bg';
                        else if (item.diff === 'move') v2026ClassColor = 'text-green-bg';
                    } else {
                        v2026ClassColor = 'custom-html';
                    }
                    rows += `<tr class="sub-compare-row"><td class="v2020 ${v2020Class}"><span class="sub-label">2020版</span>${v2020Text}</td>
                                <td class="v2026 ${v2026ClassColor}"><span class="sub-label">2026版</span>${v2026Text}${diffLabel && !useCustomHtml ? `<span class="${diffClass}">${diffLabel}</span>` : ''}</td></tr>`;
                });
                contentHtml += `<div class="compare-table-wrap"><table class="compare-table"><thead><tr><th>📄 2020版</th><th>✅ 2026版</th></tr></thead><tbody>${rows}</tbody></table></div>
                            <div style="font-size:0.78rem;color:#94a3b8;padding:4px 4px 0;display:flex;flex-wrap:wrap;gap:8px 16px;">
                                <span><span class="text-red-bg" style="background:#fee2e2;padding:0 6px;">■</span> 红色 = 新增</span>
                                <span><span class="text-green-bg" style="background:#d1fae5;padding:0 6px;">■</span> 绿色 = 修改</span>
                                <span><span class="text-blue-bg" style="background:#dbeafe;padding:0 6px;text-decoration:line-through;">■</span> 蓝色删除线 = 删除</span>
                                <span><span style="background:#fef3c7;padding:0 6px;">■</span> 黄色 = 调整位置</span>
                            </div>`;
            }
            target.innerHTML = contentHtml;
            originalContentCache[id + '_' + panel] = contentHtml;
            if (isEditing) target.contentEditable = true;
            renderNav(currentCategory);
            updateEditStatus('📄 原始内容');
        }

        function renderCategories() {
            const cats = ['全部', ...Object.keys(categoryMap)];
            let html = '';
            cats.forEach(cat => {
                const label = cat === '全部' ? '📋 全部' : `${categoryMap[cat] || ''} ${cat}`;
                const active = (cat === currentCategory) ? 'active' : '';
                html += `<button class="cat-btn ${active}" data-cat="${cat}">${label}</button>`;
            });
            document.getElementById('categoryTabs').innerHTML = html;
            document.querySelectorAll('.cat-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const cat = this.dataset.cat;
                    currentCategory = cat;
                    renderCategories();
                    currentClauseId = null;
                    if (cat === '全部') {
                        if (clauseData.length > 0) {
                            currentClauseId = clauseData[0].id;
                            showClauseInPanel(currentClauseId, 'clause');
                        }
                        renderNav('全部');
                        return;
                    }
                    const results = filterByCategory(cat);
                    if (results.length > 0) {
                        let html = `<div class="search-result-summary"><div class="result-count">📂 ${cat} 共 ${results.length} 条</div>`;
                        results.forEach(r => {
                            const source = r.matchedFrom === '子项' ? `（第${r.id}条 子项）` : '';
                            html += `<div class="result-item" data-id="${r.id}">
                                <span class="item-id">${r.id}.</span>
                                <span class="item-title">${r.title}</span>
                                ${source}
                                ${r.content ? `<div style="font-size:0.8rem;color:#64748b;margin-top:4px;">${r.content.substring(0, 80)}${r.content.length > 80 ? '...' : ''}</div>` : ''}
                            </div>`;
                        });
                        html += `</div>`;
                        document.getElementById('clauseContent').innerHTML = html;
                        document.querySelectorAll('#clauseContent .result-item').forEach(el => {
                            el.addEventListener('click', function() {
                                const id = parseInt(this.dataset.id);
                                currentClauseId = id;
                                showClauseInPanel(id, 'clause');
                                renderNav(cat, [id]);
                            });
                        });
                        renderNav(cat, results.map(r => r.id));
                    } else {
                        document.getElementById('clauseContent').innerHTML =
                            `<div class="empty-state"><div class="icon">📂</div><p>${cat} 暂无匹配条款</p></div>`;
                        renderNav(cat);
                    }
                });
            });
        }

        function performSearch(keyword) {
            keyword = keyword.trim();
            if (!keyword) {
                searchResults = [];
                document.getElementById('resetSearchBtn').style.display = 'none';
                document.getElementById('resultCount').textContent = '0';
                document.getElementById('searchResultContent').innerHTML =
                    `<div class="empty-state"><div class="icon">🔍</div><p>输入关键词后点击搜索，结果将显示在此</p></div>`;
                renderNav(currentCategory);
                if (activeTab === 'searchResult') switchTab('clause');
                if (currentClauseId) showClauseInPanel(currentClauseId, 'clause');
                else showEmpty('clause');
                return;
            }
            const lowerKeyword = keyword.toLowerCase();
            const hits = [];
            clauseData.forEach(c => {
                let match = false;
                if (c.title.toLowerCase().includes(lowerKeyword)) match = true;
                if (c.comparisons) {
                    c.comparisons.forEach(item => {
                        if (item.v2020 && item.v2020.toLowerCase().includes(lowerKeyword)) match = true;
                        if (item.v2026 && item.v2026.toLowerCase().includes(lowerKeyword)) match = true;
                    });
                }
                if (match) hits.push(c.id);
            });
            searchResults = hits;
            searchKeyword = keyword;
            document.getElementById('resultCount').textContent = hits.length;
            document.getElementById('resetSearchBtn').style.display = hits.length > 0 ? 'inline-block' : 'none';

            let summaryHtml = '';
            if (hits.length > 0) {
                summaryHtml = `<div class="search-result-summary"><div class="result-count">🔍 检索匹配结果：${hits.length}条</div>`;
                hits.forEach(id => {
                    const clause = clauseData.find(c => c.id === id);
                    if (clause) {
                        summaryHtml += `<div class="result-item" data-id="${clause.id}">
                            <span class="item-id">${clause.id}.</span>
                            <span class="item-title">${clause.title}</span>
                            <span style="font-size:0.7rem;color:#94a3b8;margin-left:8px;">点击查看完整新旧对比</span>
                        </div>`;
                    }
                });
                summaryHtml += `</div>`;
                switchTab('searchResult');
                document.getElementById('searchResultContent').innerHTML = summaryHtml;
                document.querySelectorAll('.search-result-summary .result-item').forEach(el => {
                    el.addEventListener('click', function() {
                        const id = parseInt(this.dataset.id);
                        if (isEditing) saveCurrentEdit();
                        currentClauseId = id;
                        showClauseInPanel(id, 'searchResult');
                        if (activeTab !== 'searchResult') switchTab('searchResult');
                        renderNav(currentCategory, [id]);
                    });
                });
                renderNav(currentCategory, hits);
                if (hits.length > 0) {
                    currentClauseId = hits[0];
                    showClauseInPanel(hits[0], 'searchResult');
                }
            } else {
                document.getElementById('searchResultContent').innerHTML =
                    `<div class="search-result-summary"><div class="result-count">🔍 检索匹配结果：0条</div><p style="color:#94a3b8;margin-top:12px;">未找到包含 "<strong>${keyword}</strong>" 的条款，请尝试其他关键词。</p></div>`;
                renderNav(currentCategory, []);
                if (activeTab === 'searchResult') switchTab('clause');
            }
        }

        // ================================================================
        //  测验渲染（全新：支持分类筛选 + 两种模式）
        // ================================================================
        function renderQuiz() {
            const container = document.getElementById('quizContainer');
            if (!container) return;

            // 1. 根据分类和收藏夹过滤
            let filteredQuestions = quizQuestions;
            if (quizCategoryFilter !== '全部') {
                filteredQuestions = quizQuestions.filter(q => q.category === quizCategoryFilter);
            }
            if (showFavoritesOnly) {
                filteredQuestions = filteredQuestions.filter(q => favoriteIds.includes(q.id));
            }

            // 空状态处理
            if (filteredQuestions.length === 0) {
                let emptyMsg = '暂无题目';
                if (showFavoritesOnly) emptyMsg = '暂无收藏题目，去练习中收藏吧 ⭐';
                else if (quizCategoryFilter !== '全部') emptyMsg = `「${quizCategoryFilter}」分类下暂无题目`;
                container.innerHTML =
                    `<div class="quiz-section"><div class="quiz-header"><h3>📝 ${showFavoritesOnly ? '⭐ 收藏夹练习' : '知识测验'}</h3><div class="btn-group">
                        <button class="btn mode-btn ${quizMode === 'exam' ? 'active' : ''}" id="examModeBtn">📝 考试</button>
                        <button class="btn mode-btn ${quizMode === 'practice' ? 'active' : ''}" id="practiceModeBtn">📖 刷题</button>
                        <button class="btn ${showFavoritesOnly ? 'active' : ''}" id="favoritesToggleBtn2">⭐ 收藏夹 (${favoriteIds.length})</button>
                        <button class="btn outline" id="resetCategoryBtn">📂 全部题目</button>
                    </div></div><div class="quiz-empty">${emptyMsg}</div></div>`;
                bindQuizEvents(container);
                return;
            }

            // 2. 根据模式确定展示题目
            let displayQuestions = [];
            if (quizMode === 'practice') {
                // 刷题模式：展示所有过滤后的题目（不洗牌，不截断）
                displayQuestions = filteredQuestions;
            } else {
                // 考试模式：随机抽取最多15道
                const shuffled = [...filteredQuestions];
                for (let i = shuffled.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
                }
                displayQuestions = shuffled.slice(0, Math.min(15, shuffled.length));
            }
            currentQuestions = displayQuestions;

            // 3. 构建分类筛选按钮
            let catHtml = `<div class="quiz-category-tabs">`;
            const allCats = ['全部', ...Object.keys(categoryMap)];
            allCats.forEach(cat => {
                const cnt = quizQuestions.filter(q => q.category === cat).length;
                const active = (cat === quizCategoryFilter) ? 'active' : '';
                const label = cat === '全部' ? '📋 全部' : `${categoryMap[cat] || ''} ${cat}`;
                catHtml +=
                    `<button class="qcat-btn ${active}" data-qcat="${cat}">${label} <span class="count">(${cnt})</span></button>`;
            });
            catHtml += `</div>`;

            // 4. 构建主体
            let html = catHtml;
            const modeLabel = quizMode === 'exam' ? '考试模式' : '刷题模式';
            const totalCount = filteredQuestions.length;
            const showCount = displayQuestions.length;
            const infoText = quizMode === 'exam' ? `随机抽取 ${showCount} 题（共 ${totalCount} 题）` : `展示全部 ${totalCount} 题`;

            html +=
                `<div class="quiz-section"><div class="quiz-header"><h3>📝 ${showFavoritesOnly ? '⭐ 收藏夹练习' : '知识测验'} <span style="font-size:0.7rem;font-weight:400;color:#64748b;">${quizCategoryFilter === '全部' ? '全部题目' : quizCategoryFilter} · ${modeLabel}</span></h3>
                <div class="btn-group">
                    <button class="btn mode-btn ${quizMode === 'exam' ? 'active' : ''}" id="examModeBtn">📝 考试</button>
                    <button class="btn mode-btn ${quizMode === 'practice' ? 'active' : ''}" id="practiceModeBtn">📖 刷题</button>
                    ${quizMode === 'exam' ? `<button class="btn" id="refreshQuizBtn">🔄 重新生成</button>` : `<span style="font-size:0.8rem;color:#64748b;padding:5px 8px;">${infoText}</span>`}
                    <button class="btn ${showFavoritesOnly ? 'active' : ''}" id="favoritesToggleBtn">⭐ 收藏夹 (${favoriteIds.length})</button>
                    <button class="btn" id="checkQuizBtn">📊 查看结果</button>
                </div></div><div id="quizList">`;

            displayQuestions.forEach((q, index) => {
                const isFav = isFavorite(q.id);
                const typeLabel = { single: '单选题', multi: '多选题', judge: '判断题', fill: '填空题' } [q.type] || '';
                html +=
                    `<div class="quiz-item" data-id="${q.id}" data-index="${index}"><div class="q-header"><div class="q-text">${index+1}. ${q.question}</div><span class="q-type">${typeLabel}</span></div>`;
                if (q.type === 'single' || q.type === 'judge') {
                    html += `<div class="options">`;
                    const options = q.type === 'judge' ? ['正确', '错误'] : q.options;
                    options.forEach((opt, oi) => {
                        const val = q.type === 'judge' ? (oi === 0 ? 'true' : 'false') : oi;
                        html += `<label><input type="radio" name="quiz_${q.id}" value="${val}"> ${opt}</label>`;
                    });
                    html += `</div>`;
                } else if (q.type === 'multi') {
                    html += `<div class="options">`;
                    q.options.forEach((opt, oi) => {
                        html += `<label><input type="checkbox" name="quiz_${q.id}" value="${oi}"> ${opt}</label>`;
                    });
                    html += `</div>`;
                } else if (q.type === 'fill') {
                    html += `<input type="text" class="fill-input" placeholder="请输入答案..." data-id="${q.id}">`;
                }
                html +=
                    `<div class="answer" id="quizAnswer_${q.id}"></div><div class="action-row"><button class="fav-btn ${isFav ? 'active' : ''}" data-id="${q.id}" title="收藏/取消收藏">${isFav ? '⭐' : '☆'}</button></div></div>`;
            });
            html += `</div><div class="quiz-score" id="quizScore"></div></div>`;
            container.innerHTML = html;

            // 5. 绑定事件
            bindQuizEvents(container);
            updateFavCount();
        }

        function bindQuizEvents(container) {
            // 收藏按钮
            container.querySelectorAll('.fav-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const id = parseInt(this.dataset.id);
                    toggleFavorite(this, id);
                });
            });
            // 分类切换
            container.querySelectorAll('.qcat-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    quizCategoryFilter = this.dataset.qcat;
                    showFavoritesOnly = false;
                    renderQuiz();
                });
            });
            // 模式切换
            const examBtn = document.getElementById('examModeBtn');
            const practiceBtn = document.getElementById('practiceModeBtn');
            if (examBtn) {
                examBtn.addEventListener('click', function() {
                    quizMode = 'exam';
                    renderQuiz();
                });
            }
            if (practiceBtn) {
                practiceBtn.addEventListener('click', function() {
                    quizMode = 'practice';
                    renderQuiz();
                });
            }
            // 刷新
            const refreshBtn = document.getElementById('refreshQuizBtn');
            if (refreshBtn) {
                refreshBtn.addEventListener('click', function() {
                    if (quizMode === 'exam') {
                        // 重新抽取
                        let filtered = quizQuestions;
                        if (quizCategoryFilter !== '全部') filtered = filtered.filter(q => q.category ===
                            quizCategoryFilter);
                        if (showFavoritesOnly) filtered = filtered.filter(q => favoriteIds.includes(q.id));
                        if (filtered.length > 0) {
                            const shuffled = [...filtered];
                            for (let i = shuffled.length - 1; i > 0; i--) {
                                const j = Math.floor(Math.random() * (i + 1));
                                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
                            }
                            currentQuestions = shuffled.slice(0, Math.min(15, shuffled.length));
                            renderQuiz();
                        }
                    }
                });
            }
            // 收藏夹
            const favBtn = document.getElementById('favoritesToggleBtn');
            if (favBtn) {
                favBtn.addEventListener('click', function() {
                    showFavoritesOnly = !showFavoritesOnly;
                    renderQuiz();
                });
            }
            const favBtn2 = document.getElementById('favoritesToggleBtn2');
            if (favBtn2) {
                favBtn2.addEventListener('click', function() {
                    showFavoritesOnly = !showFavoritesOnly;
                    renderQuiz();
                });
            }
            // 重置分类
            const resetCatBtn = document.getElementById('resetCategoryBtn');
            if (resetCatBtn) {
                resetCatBtn.addEventListener('click', function() {
                    quizCategoryFilter = '全部';
                    showFavoritesOnly = false;
                    renderQuiz();
                });
            }
            // 查看结果
            const checkBtn = document.getElementById('checkQuizBtn');
            if (checkBtn) {
                checkBtn.addEventListener('click', checkQuiz);
            }
        }

        function regenerateQuestions() {
            // 外部调用（如初始化） - 直接进入考试模式随机抽取
            quizMode = 'exam';
            renderQuiz();
        }

        function checkQuiz() {
            const items = document.querySelectorAll('.quiz-item');
            let correct = 0,
                total = 0;
            items.forEach(item => {
                const id = parseInt(item.dataset.id);
                const q = quizQuestions.find(q => q.id === id);
                if (!q) return;
                total++;
                let userAnswer = null,
                    isCorrect = false;
                if (q.type === 'single' || q.type === 'judge') {
                    const selected = item.querySelector(`input[name="quiz_${id}"]:checked`);
                    if (selected) {
                        const val = selected.value;
                        if (q.type === 'judge') userAnswer = val === 'true';
                        else userAnswer = parseInt(val);
                    }
                    if (q.type === 'judge') isCorrect = (userAnswer === q.answer);
                    else isCorrect = (userAnswer === q.answer);
                } else if (q.type === 'multi') {
                    const checkboxes = item.querySelectorAll(`input[name="quiz_${id}"]:checked`);
                    userAnswer = Array.from(checkboxes).map(cb => parseInt(cb.value));
                    const sortedUser = [...userAnswer].sort();
                    const sortedCorrect = [...q.answer].sort();
                    isCorrect = (sortedUser.length === sortedCorrect.length && sortedUser.every((v, i) => v === sortedCorrect[
                    i]));
                } else if (q.type === 'fill') {
                    const input = item.querySelector('.fill-input');
                    if (input) {
                        userAnswer = input.value.trim();
                        isCorrect = (userAnswer.toLowerCase() === q.answer.toLowerCase());
                    }
                }
                if (isCorrect) correct++;
                const answerEl = document.getElementById(`quizAnswer_${id}`);
                if (answerEl) {
                    let answerText = '';
                    if (q.type === 'single') answerText = `正确答案：${q.options[q.answer]}`;
                    else if (q.type === 'multi') answerText = `正确答案：${q.answer.map(i => q.options[i]).join('、')}`;
                    else if (q.type === 'judge') answerText = `正确答案：${q.answer ? '正确' : '错误'}`;
                    else if (q.type === 'fill') answerText = `正确答案：${q.answer}`;
                    answerEl.innerHTML =
                        `<strong>${answerText}</strong><br><span style="color:#475569;">💡 ${q.explanation}</span>`;
                    answerEl.classList.add('show');
                    answerEl.classList.remove('correct', 'wrong');
                    if (isCorrect) answerEl.classList.add('correct');
                    else answerEl.classList.add('wrong');
                }
            });
            const scoreEl = document.getElementById('quizScore');
            if (scoreEl) scoreEl.textContent = `✅ 得分：${correct} / ${total}  (${Math.round(correct/total*100)}%)`;
        }

        function switchTab(tab) {
            activeTab = tab;
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.tab === tab);
            });
            document.getElementById('clausePanel').classList.toggle('active', tab === 'clause');
            document.getElementById('searchResultPanel').classList.toggle('active', tab === 'searchResult');
            document.getElementById('quizPanel').classList.toggle('active', tab === 'quiz');
            if (tab === 'quiz') {
                if (currentQuestions.length === 0) regenerateQuestions();
                else renderQuiz();
            }
            document.getElementById('quizToggleBtn').textContent = (tab === 'quiz') ? '❌ 关闭测验' : '📝 测验';
            document.getElementById('quizToggleBtn').classList.toggle('active', tab === 'quiz');
            if (tab === 'clause' || tab === 'searchResult') {
                currentEditPanel = tab;
                if (currentClauseId && tab === 'searchResult' && searchResults.length === 0) {
                    if (!document.getElementById('searchResultContent').querySelector('.clause-header')) {
                        showClauseInPanel(currentClauseId, 'searchResult');
                    }
                } else if (currentClauseId && tab === 'clause') {
                    if (!document.getElementById('clauseContent').querySelector('.clause-header')) {
                        showClauseInPanel(currentClauseId, 'clause');
                    }
                }
            }
        }

        function setupEditor() {
            document.getElementById('cmdEditToggle').addEventListener('click', toggleEditMode);
            document.getElementById('cmdResetClause').addEventListener('click', resetCurrentClause);
            document.getElementById('cmdExport').addEventListener('click', exportModifiedHTML);

            document.getElementById('cmdUndo').addEventListener('click', function() { document.execCommand('undo', false, null);
                saveCurrentEdit(); });
            document.getElementById('cmdRedo').addEventListener('click', function() { document.execCommand('redo', false, null);
                saveCurrentEdit(); });
            document.getElementById('cmdBold').addEventListener('click', function() { document.execCommand('bold', false, null);
                saveCurrentEdit(); });
            document.getElementById('cmdItalic').addEventListener('click', function() { document.execCommand('italic', false,
                    null);
                saveCurrentEdit(); });
            document.getElementById('cmdUnderline').addEventListener('click', function() { document.execCommand('underline',
                    false, null);
                saveCurrentEdit(); });
            document.getElementById('cmdStrike').addEventListener('click', function() { document.execCommand('strikeThrough',
                    false, null);
                saveCurrentEdit(); });
            document.getElementById('cmdClear').addEventListener('click', function() { document.execCommand('removeFormat',
                    false, null);
                saveCurrentEdit(); });
            document.querySelectorAll('.color-btn').forEach(btn => {
                btn.addEventListener('click', function() { document.execCommand('foreColor', false, this.dataset
                        .color);
                    saveCurrentEdit(); });
            });
            document.getElementById('cmdColor').addEventListener('input', function(e) { document.execCommand('foreColor',
                    false, e.target.value);
                saveCurrentEdit(); });

            function getSelectedCell() {
                const sel = window.getSelection();
                if (!sel.rangeCount) return null;
                const range = sel.getRangeAt(0);
                let node = range.startContainer;
                while (node && node.nodeType !== 1) node = node.parentNode;
                if (!node) return null;
                return node.closest('td, th');
            }

            document.getElementById('cmdTableInsertRowAbove').addEventListener('click', function() {
                const cell = getSelectedCell();
                if (!cell) return;
                const row = cell.closest('tr'),
                    table = row.closest('table');
                if (!table) return;
                const newRow = table.insertRow(row.rowIndex);
                for (let i = 0; i < row.cells.length; i++) { const nc = newRow.insertCell(i);
                    nc.innerHTML = '&nbsp;';
                    nc.contentEditable = true; }
                saveCurrentEdit();
            });
            document.getElementById('cmdTableInsertRowBelow').addEventListener('click', function() {
                const cell = getSelectedCell();
                if (!cell) return;
                const row = cell.closest('tr'),
                    table = row.closest('table');
                if (!table) return;
                const newRow = table.insertRow(row.rowIndex + 1);
                for (let i = 0; i < row.cells.length; i++) { const nc = newRow.insertCell(i);
                    nc.innerHTML = '&nbsp;';
                    nc.contentEditable = true; }
                saveCurrentEdit();
            });
            document.getElementById('cmdTableDeleteRow').addEventListener('click', function() {
                const cell = getSelectedCell();
                if (!cell) return;
                const row = cell.closest('tr'),
                    table = row.closest('table');
                if (!table || table.rows.length <= 1) return;
                table.deleteRow(row.rowIndex);
                saveCurrentEdit();
            });
            document.getElementById('cmdTableInsertColLeft').addEventListener('click', function() {
                const cell = getSelectedCell();
                if (!cell) return;
                const row = cell.closest('tr'),
                    table = row.closest('table');
                if (!table) return;
                const ci = cell.cellIndex;
                for (let r = 0; r < table.rows.length; r++) { const nc = table.rows[r].insertCell(ci);
                    nc.innerHTML = '&nbsp;';
                    nc.contentEditable = true; }
                saveCurrentEdit();
            });
            document.getElementById('cmdTableDeleteCol').addEventListener('click', function() {
                const cell = getSelectedCell();
                if (!cell) return;
                const row = cell.closest('tr'),
                    table = row.closest('table');
                if (!table || row.cells.length <= 1) return;
                const ci = cell.cellIndex;
                for (let r = 0; r < table.rows.length; r++) table.rows[r].deleteCell(ci);
                saveCurrentEdit();
            });

            const c1 = document.getElementById('clauseContent'),
                c2 = document.getElementById('searchResultContent');

            function handleContentChange(e) {
                if (isEditing && currentClauseId) {
                    const target = e.currentTarget;
                    if (target.querySelector('.empty-state')) return;
                    const panel = (target === c1) ? 'clause' : 'searchResult';
                    saveClauseEdit(currentClauseId, target.innerHTML, panel);
                }
            }
            c1.addEventListener('input', handleContentChange);
            c2.addEventListener('input', handleContentChange);

            ['cmdBold', 'cmdItalic', 'cmdUnderline', 'cmdStrike', 'cmdClear', 'cmdUndo', 'cmdRedo',
                'cmdTableInsertRowAbove', 'cmdTableInsertRowBelow', 'cmdTableDeleteRow',
                'cmdTableInsertColLeft', 'cmdTableDeleteCol'
            ].forEach(id => { const el = document.getElementById(id); if (el) el.disabled = true; });
            document.querySelectorAll('.color-btn, #cmdColor').forEach(el => { el.disabled = true; });
            document.getElementById('cmdResetClause').disabled = true;
            document.getElementById('cmdExport').disabled = true;
        }

        function toggleEditMode() {
            isEditing = !isEditing;
            const c1 = document.getElementById('clauseContent'),
                c2 = document.getElementById('searchResultContent');
            if (!isEditing) saveCurrentEdit();
            c1.contentEditable = isEditing;
            c2.contentEditable = isEditing;
            const btn = document.getElementById('cmdEditToggle');
            btn.textContent = isEditing ? '✏️ 退出编辑' : '✏️ 编辑';
            btn.classList.toggle('active', isEditing);
            document.getElementById('cmdResetClause').disabled = !isEditing;
            document.getElementById('cmdExport').disabled = !isEditing;
            ['cmdBold', 'cmdItalic', 'cmdUnderline', 'cmdStrike', 'cmdClear', 'cmdUndo', 'cmdRedo',
                'cmdTableInsertRowAbove', 'cmdTableInsertRowBelow', 'cmdTableDeleteRow',
                'cmdTableInsertColLeft', 'cmdTableDeleteCol'
            ].forEach(id => { const el = document.getElementById(id); if (el) el.disabled = !isEditing; });
            document.querySelectorAll('.color-btn, #cmdColor').forEach(el => { el.disabled = !isEditing; });
            const tip = document.querySelector('.editor-toolbar .save-status');
            if (tip) tip.textContent = isEditing ? '✏️ 编辑中 · 自动保存' : '💾 自动保存';
            if (isEditing) {
                const target = (currentEditPanel === 'clause') ? document.getElementById('clauseContent') : document
                    .getElementById('searchResultContent');
                if (target && !target.querySelector('.empty-state')) target.focus();
            }
        }

        function exportModifiedHTML() {
            if (isEditing) saveCurrentEdit();
            const mods = {};
            const allIds = clauseData.map(c => c.id);
            for (const id of allIds) {
                const cKey = STORAGE_PREFIX_CLAUSE + id;
                const sKey = STORAGE_PREFIX_SEARCH + id;
                const cVal = localStorage.getItem(cKey);
                const sVal = localStorage.getItem(sKey);
                if (cVal) mods['clause_' + id] = cVal;
                if (sVal) mods['searchResult_' + id] = sVal;
            }

            let fullHTML = document.documentElement.outerHTML;
            const scriptTagIndex = fullHTML.indexOf('<script');
            if (scriptTagIndex !== -1) {
                const preloadScript = `<script>
                    window.__PRELOADED_MODS__ = ${JSON.stringify(mods)};
                    console.log('✅ 已载入 ' + Object.keys(window.__PRELOADED_MODS__).length + ' 项硬编码修改');
                <\/script>`;
                fullHTML = fullHTML.slice(0, scriptTagIndex) + preloadScript + fullHTML.slice(scriptTagIndex);
            }

            const blob = new Blob([fullHTML], { type: 'text/html;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `煤矿重大事故隐患判定标准_硬编码版_${new Date().toISOString().slice(0,10)}.html`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            updateEditStatus(`✅ 已导出硬编码版，修改永久固化 (${new Date().toLocaleTimeString()})`);
        }

        function setupNavDelegation() {
            document.getElementById('navList').addEventListener('click', function(e) {
                const item = e.target.closest('.nav-item');
                if (!item) return;
                const id = parseInt(item.dataset.id);
                if (isNaN(id)) return;
                if (isEditing) saveCurrentEdit();
                currentClauseId = id;
                if (activeTab === 'searchResult' || (searchKeyword && searchResults.length > 0)) {
                    showClauseInPanel(id, 'searchResult');
                    if (activeTab !== 'searchResult') switchTab('searchResult');
                } else {
                    showClauseInPanel(id, 'clause');
                    if (activeTab !== 'clause') switchTab('clause');
                }
                renderNav(currentCategory);
                updateEditStatus('📄 已加载');
            });
        }

        // ================================================================
        //  初始化
        // ================================================================
        function init() {
            if (window.__PRELOADED_MODS__) {
                console.log('✅ 检测到硬编码修改数据（方案B），' + Object.keys(window.__PRELOADED_MODS__).length + ' 项，将直接使用');
            }

            loadFavorites();
            renderCategories();
            renderNav('全部');

            if (clauseData.length > 0) {
                currentClauseId = clauseData[0].id;
                showClauseInPanel(currentClauseId, 'clause');
            } else { showEmpty('clause');
                showEmpty('searchResult'); }

            // 初始化测验：默认考试模式，全部题目随机
            quizMode = 'exam';
            quizCategoryFilter = '全部';
            regenerateQuestions();
            switchTab('clause');

            setupEditor();
            setupNavDelegation();

            document.getElementById('searchBtn').addEventListener('click', function() {
                if (isEditing) saveCurrentEdit();
                performSearch(document.getElementById('searchInput').value);
            });
            document.getElementById('searchInput').addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    if (isEditing) saveCurrentEdit();
                    performSearch(this.value);
                }
            });
            document.getElementById('resetSearchBtn').addEventListener('click', function() {
                document.getElementById('searchInput').value = '';
                searchKeyword = '';
                searchResults = [];
                this.style.display = 'none';
                document.getElementById('resultCount').textContent = '0';
                document.getElementById('searchResultContent').innerHTML =
                    `<div class="empty-state"><div class="icon">🔍</div><p>输入关键词后点击搜索，结果将显示在此</p></div>`;
                renderNav(currentCategory);
                if (currentClauseId) showClauseInPanel(currentClauseId, 'clause');
                else showEmpty('clause');
                if (activeTab === 'searchResult') switchTab('clause');
            });

            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    if (isEditing) saveCurrentEdit();
                    switchTab(this.dataset.tab);
                });
            });
            document.getElementById('quizToggleBtn').addEventListener('click', function() {
                if (isEditing) saveCurrentEdit();
                switchTab(activeTab === 'quiz' ? 'clause' : 'quiz');
            });

            document.getElementById('resetSearchBtn').style.display = 'none';
            document.getElementById('resultCount').textContent = '0';
            document.getElementById('searchResultTab').style.display = 'block';
            document.getElementById('searchResultContent').innerHTML =
                `<div class="empty-state"><div class="icon">🔍</div><p>输入关键词后点击搜索，结果将显示在此</p></div>`;

            window.addEventListener('beforeunload', function() { if (isEditing) saveCurrentEdit(); });
            updateEditStatus('💾 自动保存已开启 · 点击"导出修改版"导出完整动态页面');

            // 初始渲染测验
            renderQuiz();
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
